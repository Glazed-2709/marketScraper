name: Scrape prices

on:
  schedule:
    # Toutes les 6 heures. Format cron UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
    # Permet aussi de le lancer manuellement depuis l'onglet Actions du repo.

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config --global user.name "price-bot"
          git config --global user.email "price-bot@users.noreply.github.com"
          git add data/prices.json
          git diff --staged --quiet || git commit -m "chore: mise a jour des prix ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
