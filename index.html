<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>epsilon// price terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0B0D; --panel:#111318; --panel2:#15171D; --border:#1E2128;
  --text:#E4E7EB; --muted:#6B7280; --dim:#3A3F47;
  --green:#00D67A; --red:#FF4757; --amber:#F5A623; --blue:#3B82F6;
}
*{box-sizing:border-box;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#26282E;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#34363D;}
*{scrollbar-width:thin;scrollbar-color:#26282E var(--bg);}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;}
.num{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;}
.wrap{display:grid;grid-template-columns:270px 1fr 250px;gap:1px;background:var(--border);height:100vh;}
.panel{background:var(--panel);overflow-y:auto;}
.hdr{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.row{padding:9px 14px;border-bottom:1px solid #16181E;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.row:hover{background:var(--panel2);}
.row.active{background:var(--panel2);border-left:2px solid var(--amber);}
.name{font-size:12px;}
.sub{color:var(--muted);font-size:10px;margin-top:2px;}
.px{text-align:right;font-weight:600;white-space:nowrap;}
.chg{font-size:10px;}
.up{color:var(--green);} .down{color:var(--red);}
.rmbtn{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:0 4px;line-height:1;}
.rmbtn:hover{color:var(--red);}
.main{padding:20px;}
.ticker-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:16px;}
.ticker-name{font-size:19px;font-weight:500;font-family:'Inter',sans-serif;}
.ticker-price{font-size:32px;font-weight:700;letter-spacing:-.02em;}
.badge{display:inline-block;padding:3px 8px;border-radius:2px;font-size:11px;font-weight:600;margin-left:8px;vertical-align:middle;}
.badge.up{background:rgba(0,214,122,.12);color:var(--green);}
.badge.down{background:rgba(255,71,87,.12);color:var(--red);}
svg{display:block;}
.chart-box{position:relative;border:1px solid var(--border);background:var(--panel2);padding:12px 12px 4px;}
.crosshair-info{position:absolute;top:8px;left:16px;font-size:11px;color:var(--muted);pointer-events:none;z-index:2;}
.crosshair-info b{color:var(--text);font-size:13px;}
.zoomctl{position:absolute;top:8px;right:16px;display:flex;gap:4px;z-index:2;}
.zbtn{background:var(--panel);border:1px solid var(--border);color:var(--muted);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:13px;line-height:1;font-family:'Inter',sans-serif;}
.zbtn:hover{border-color:var(--amber);color:var(--amber);}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin:16px 0;border:1px solid var(--border);}
.stat{background:var(--panel);padding:10px 14px;}
.stat .l{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-family:'Inter',sans-serif;}
.stat .v{font-size:16px;font-weight:600;margin-top:4px;}
.stat input{background:transparent;border:none;color:var(--amber);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;margin-top:4px;width:100%;padding:0;}
.stat input:focus{outline:none;border-bottom:1px solid var(--amber);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;}
.alertbox{margin:14px 0;padding:10px 12px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:2px;font-size:11px;color:var(--amber);}
.footer-note{padding:10px 14px;font-size:10px;color:var(--dim);border-top:1px solid var(--border);line-height:1.5;}
.legend{display:flex;gap:14px;font-size:10px;color:var(--muted);margin-top:6px;flex-wrap:wrap;}
.legend span{display:flex;align-items:center;gap:5px;}
.legend i{width:14px;height:2px;display:inline-block;}
.legend i.hist{background:var(--text);}
.legend i.fc{background:var(--amber);border-top:1px dashed var(--amber);height:0;border-bottom:1px dashed var(--amber);}
.legend i.tgt{background:var(--green);border-top:1px dashed var(--green);height:0;border-bottom:1px dashed var(--green);}
.addform{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
.addform input{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 8px;border-radius:2px;}
.addform input:focus{outline:none;border-color:var(--amber);}
.addbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Inter',sans-serif;font-size:11px;padding:6px 8px;border-radius:2px;cursor:pointer;}
.addbtn:hover{border-color:var(--amber);color:var(--amber);}
.addbtn.ghost{background:transparent;font-size:10px;padding:4px 6px;color:var(--muted);}
.supsrcrow{display:flex;gap:4px;}
.supsrcrow input{flex:1;}
.supblock{padding:8px 14px;border-bottom:1px solid #16181E;}
.supblock .cname{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:'Inter',sans-serif;}
.supline{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;}
.supline a{color:var(--blue);text-decoration:none;}
.supline a:hover{text-decoration:underline;}
.supline .p{font-weight:600;}
.emptystate{padding:40px 20px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}
.emptystate code{background:var(--panel2);padding:2px 6px;border-radius:2px;color:var(--amber);}
.statusbar{padding:8px 14px;font-size:10px;color:var(--dim);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="hdr">Watchlist <span id="wl-count"></span></div>
    <div class="addform" id="addform">
      <input id="new-ref" placeholder="Reference produit (ex: F5-6000J3038F16GX2-FX5)" />
      <input id="new-target" placeholder="Prix cible (EUR)" type="number" />
      <div id="src-rows"></div>
      <button class="addbtn ghost" onclick="addSourceRow()">+ ajouter un fournisseur</button>
      <button class="addbtn" onclick="addComponent()">+ Ajouter a la watchlist</button>
    </div>
    <div id="watchlist"></div>
    <div class="footer-note">Donnees issues de <code style="color:var(--amber)">data/prices.json</code>, generees par le scraper GitHub Actions. Aucune valeur simulee ou de demonstration.</div>
  </div>

  <div class="panel main" id="main"></div>

  <div class="panel">
    <div class="hdr">Alertes</div>
    <div id="alerts"></div>
    <div class="hdr">Fournisseurs</div>
    <div id="sources"></div>
  </div>
</div>

<script>
let COMPONENTS = [];
let active = null;
let zoom = 1;
let dataLoaded = false;

function fmt(n){ if(n==null||isNaN(n)) return '--'; return n.toLocaleString('fr-FR',{maximumFractionDigits:0})+' EUR'; }
function pct(a,b){ if(!b) return 0; return ((a-b)/b*100); }

async function loadData(){
  try{
    const res = await fetch('data/prices.json', {cache:'no-store'});
    if(!res.ok) throw new Error('not found');
    const json = await res.json();
    const comps = json.components || {};
    COMPONENTS = Object.keys(comps).map(function(id){
      const c = comps[id];
      const hist = (c.history||[]).map(function(h){return h.min_price;});
      const suppliers = c.history && c.history.length
        ? c.history[c.history.length-1].suppliers
        : [];
      return {
        id: id,
        name: c.name,
        cat: c.cat,
        target: c.target,
        hist: hist,
        timestamps: (c.history||[]).map(function(h){return h.timestamp;}),
        suppliers: suppliers
      };
    });
    dataLoaded = true;
    if(COMPONENTS.length && !active) active = COMPONENTS[0].id;
    document.getElementById('statusbar-time').textContent = json.last_run
      ? ('derniere collecte : '+new Date(json.last_run).toLocaleString('fr-FR'))
      : '';
  }catch(e){
    dataLoaded = false;
  }
  renderAll();
}

function renderStatusBar(){
  let bar = document.getElementById('statusbar');
  if(!bar){
    bar = document.createElement('div');
    bar.className = 'statusbar';
    bar.id = 'statusbar';
    bar.innerHTML = '<span>epsilon// price terminal</span><span id="statusbar-time"></span>';
    document.querySelector('.main').parentNode.insertBefore(bar, document.querySelector('.main'));
  }
}

function renderWatchlist(){
  const el = document.getElementById('watchlist');
  document.getElementById('wl-count').textContent = COMPONENTS.length;
  if(!COMPONENTS.length){
    el.innerHTML = '<div class="sub" style="padding:14px">Aucune donnee. Ajoute un produit ci-dessus puis lance le scraper.</div>';
    return;
  }
  el.innerHTML = COMPONENTS.map(function(c){
    const last = c.hist.length ? c.hist[c.hist.length-1] : null;
    const prev = c.hist.length>7 ? c.hist[c.hist.length-8] : (c.hist[0]||null);
    const change = (last!=null && prev) ? pct(last, prev) : 0;
    const up = change >= 0;
    return '<div class="row '+(c.id===active?'active':'')+'">'
      +'<div onclick="selectComp(\''+c.id+'\')" style="flex:1;min-width:0">'
      +'<div class="name">'+c.name+'</div>'
      +'<div class="sub">'+c.cat+' - cible <span class="num">'+fmt(c.target)+'</span></div>'
      +'</div>'
      +'<div onclick="selectComp(\''+c.id+'\')">'
      +'<div class="px num">'+fmt(last)+'</div>'
      +'<div class="chg num '+(up?'up':'down')+'">'+(up?'+':'')+change.toFixed(1)+'%</div>'
      +'</div>'
      +'<button class="rmbtn" onclick="event.stopPropagation();removeComponent(\''+c.id+'\')">x</button>'
      +'</div>';
  }).join('');
}

function addSourceRow(){
  const wrap = document.getElementById('src-rows');
  const row = document.createElement('div');
  row.className = 'supsrcrow';
  row.innerHTML = '<input placeholder="Fournisseur (ex: LDLC)" class="src-site"/>'
    +'<input placeholder="URL fiche produit" class="src-url"/>';
  wrap.appendChild(row);
}
addSourceRowInit();
function addSourceRowInit(){ setTimeout(addSourceRow, 0); }

function addComponent(){
  const ref = document.getElementById('new-ref').value.trim();
  const target = parseFloat(document.getElementById('new-target').value);
  if(!ref) return;
  if(!target || isNaN(target)){
    alert('Renseigne un prix cible.');
    return;
  }
  const siteInputs = document.querySelectorAll('.src-site');
  const urlInputs = document.querySelectorAll('.src-url');
  const sources = [];
  for(let i=0;i<siteInputs.length;i++){
    const site = siteInputs[i].value.trim();
    const url = urlInputs[i].value.trim();
    if(site && url) sources.push({site:site, url:url});
  }
  if(!sources.length){
    alert('Ajoute au moins un fournisseur avec son URL de fiche produit.');
    return;
  }
  const snippet = sources.map(function(s){
    return '            {"site": "'+s.site+'", "url": "'+s.url+'"},';
  }).join('\n');
  alert('Ajoute cette entree dans WATCHLIST de scraper.py :\n\n'
    +'{\n'
    +'    "id": "identifiant_court",\n'
    +'    "name": "'+ref+'",\n'
    +'    "cat": "RAM/GPU/CPU/...",\n'
    +'    "target": '+target+',\n'
    +'    "sources": [\n'
    +snippet+'\n'
    +'    ],\n'
    +'},\n\n'
    +'puis relance le scraper. Cette interface lit uniquement data/prices.json -- elle ne peut pas ecrire dans le repo elle-meme.');
}

function removeComponent(id){
  alert('Retire cette entree de WATCHLIST dans scraper.py puis relance le scraper. Cette interface est en lecture seule sur data/prices.json.');
}

function updateTarget(val){
  const c = COMPONENTS.find(function(x){return x.id===active;});
  const v = parseFloat(val);
  if(c && !isNaN(v) && v>0){
    c.target = v;
    renderMain(); renderWatchlist(); renderAlerts();
    document.getElementById('target-note').textContent = 'Cible modifiee localement -- pense a la mettre a jour aussi dans scraper.py pour qu elle persiste.';
  }
}

function zoomIn(){ zoom = Math.min(zoom*1.5, 6); renderMain(); }
function zoomOut(){ zoom = Math.max(zoom/1.5, 0.4); renderMain(); }

function niceStep(range, targetTicks){
  const raw = range/targetTicks;
  const mag = Math.pow(10, Math.floor(Math.log10(raw||1)));
  const norm = raw/mag;
  let step;
  if(norm<1.5) step=1; else if(norm<3) step=2; else if(norm<7) step=5; else step=10;
  return step*mag;
}

function buildChartSVG(c){
  const fullHist = c.hist.length ? c.hist : [c.target];
  const visibleCount = Math.max(4, Math.round(fullHist.length/zoom));
  const startIdx = Math.max(0, fullHist.length-visibleCount);
  const hist = fullHist.slice(startIdx);

  const w = 660, h = 240, padL = 56, padR = 16, padT = 10, padB = 26;
  const plotW = w-padL-padR, plotH = h-padT-padB;

  const allVisible = hist.concat([c.target]);
  const min = Math.min.apply(null, allVisible), max = Math.max.apply(null, allVisible);
  const pad = (max-min)*0.08 || Math.max(1,max*0.05);
  const lo = min-pad, hi = max+pad;

  const totalPts = Math.max(hist.length,2);
  const stepX = plotW/(totalPts-1);

  function xAt(i){ return padL + i*stepX; }
  function yAt(v){ return padT + plotH - (v-lo)/(hi-lo)*plotH; }

  const yStep = niceStep(hi-lo, 5);
  const yTicks = [];
  for(let t=Math.ceil(lo/yStep)*yStep; t<=hi; t+=yStep) yTicks.push(t);

  const xTickEvery = Math.max(1, Math.round(totalPts/8));
  const xTicks = [];
  for(let i=0;i<hist.length;i+=xTickEvery){
    xTicks.push({x:xAt(i), label:'#'+(startIdx+i+1)});
  }

  let gridSvg = '';
  yTicks.forEach(function(t){
    const y = yAt(t);
    gridSvg += '<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(w-padR)+'" y2="'+y.toFixed(1)+'" stroke="#1C1F26" stroke-width="1"/>';
    gridSvg += '<text x="'+(padL-8)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="#6B7280" font-family="JetBrains Mono, monospace">'+Math.round(t)+'</text>';
  });
  xTicks.forEach(function(tk){
    gridSvg += '<line x1="'+tk.x.toFixed(1)+'" y1="'+padT+'" x2="'+tk.x.toFixed(1)+'" y2="'+(h-padB)+'" stroke="#1C1F26" stroke-width="1"/>';
    gridSvg += '<text x="'+tk.x.toFixed(1)+'" y="'+(h-padB+14)+'" text-anchor="middle" font-size="9" fill="#6B7280" font-family="JetBrains Mono, monospace">'+tk.label+'</text>';
  });

  const histPts = hist.map(function(v,i){return xAt(i).toFixed(1)+','+yAt(v).toFixed(1);}).join(' ');
  const targetY = yAt(c.target);

  const svg = '<svg id="chart-svg" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="width:100%;height:auto;cursor:crosshair;">'
    +gridSvg
    +'<line x1="'+padL+'" y1="'+targetY.toFixed(1)+'" x2="'+(w-padR)+'" y2="'+targetY.toFixed(1)+'" stroke="#00D67A" stroke-width="1.3" stroke-dasharray="5,3"/>'
    +'<text x="'+(w-padR)+'" y="'+(targetY-4).toFixed(1)+'" text-anchor="end" font-size="9" fill="#00D67A" font-family="JetBrains Mono, monospace">cible '+Math.round(c.target)+'</text>'
    +(hist.length>1 ? '<polyline points="'+histPts+'" fill="none" stroke="#E4E7EB" stroke-width="1.5"/>' : '')
    +(hist.length===1 ? '<circle cx="'+xAt(0).toFixed(1)+'" cy="'+yAt(hist[0]).toFixed(1)+'" r="3" fill="#E4E7EB"/>' : '')
    +'<line id="ch-line" x1="0" y1="'+padT+'" x2="0" y2="'+(h-padB)+'" stroke="#6B7280" stroke-width="1" opacity="0" stroke-dasharray="2,2"/>'
    +'<circle id="ch-dot" r="3" fill="#F5A623" opacity="0"/>'
    +'</svg>';

  return {svg:svg, meta:{w:w,h:h,padL:padL,padT:padT,padB:padB,stepX:stepX,totalPts:hist.length,lo:lo,hi:hi,hist:hist,startIdx:startIdx,plotH:plotH}};
}

function attachCrosshair(meta){
  const svg = document.getElementById('chart-svg');
  const info = document.getElementById('crosshair-info');
  const line = document.getElementById('ch-line');
  const dot = document.getElementById('ch-dot');
  if(!svg || meta.hist.length<2) return;
  svg.addEventListener('mousemove', function(e){
    const rect = svg.getBoundingClientRect();
    const scaleX = meta.w/rect.width;
    const mx = (e.clientX-rect.left)*scaleX;
    let idx = Math.round((mx-meta.padL)/meta.stepX);
    idx = Math.max(0, Math.min(meta.totalPts-1, idx));
    const val = meta.hist[idx];
    const x = meta.padL + idx*meta.stepX;
    const y = meta.padT + meta.plotH - (val-meta.lo)/(meta.hi-meta.lo)*meta.plotH;
    line.setAttribute('x1', x); line.setAttribute('x2', x); line.setAttribute('opacity', 1);
    dot.setAttribute('cx', x); dot.setAttribute('cy', y); dot.setAttribute('opacity', 1);
    info.innerHTML = '#'+(meta.startIdx+idx+1)+' &nbsp;<b class="num">'+fmt(val)+'</b>';
  });
  svg.addEventListener('mouseleave', function(){
    line.setAttribute('opacity',0);
    dot.setAttribute('opacity',0);
    info.innerHTML = '';
  });
  svg.addEventListener('wheel', function(e){
    e.preventDefault();
    if(e.deltaY<0) zoomIn(); else zoomOut();
  }, {passive:false});
}

function renderMain(){
  const el = document.getElementById('main');
  if(!dataLoaded){
    el.innerHTML = '<div class="emptystate">Impossible de charger <code>data/prices.json</code>.<br><br>'
      +'Cette page doit etre hebergee (ex: GitHub Pages) a cote du fichier genere par le scraper.<br>'
      +'Lance le workflow GitHub Actions au moins une fois pour generer les donnees.</div>';
    return;
  }
  const c = COMPONENTS.find(function(x){return x.id===active;});
  if(!c){ el.innerHTML = '<div class="emptystate">Watchlist vide. Ajoute un produit dans scraper.py.</div>'; return; }

  const hist = c.hist;
  const last = hist.length ? hist[hist.length-1] : null;
  const first = hist.length ? hist[0] : null;
  const prev = hist.length>1 ? hist[hist.length-2] : last;
  const changeAll = (last!=null && first) ? pct(last, first) : 0;
  const changeDay = (last!=null && prev) ? pct(last, prev) : 0;
  const up = changeDay >= 0;
  const toTarget = last!=null ? pct(c.target, last) : 0;
  const built = buildChartSVG(c);

  el.innerHTML =
    '<div class="ticker-top">'
    +'<div>'
    +'<div class="ticker-name">'+c.name+'</div>'
    +'<div class="sub" style="margin-top:4px">'+c.cat+' - '+c.suppliers.length+' fournisseur(s) suivi(s)</div>'
    +'</div>'
    +'<div style="text-align:right">'
    +'<div class="ticker-price num">'+fmt(last)+'<span class="badge '+(up?'up':'down')+'">'+(up?'+':'')+changeDay.toFixed(2)+'% 24h</span></div>'
    +'</div>'
    +'</div>'
    +'<div class="chart-box">'
    +'<div id="crosshair-info" class="crosshair-info num"></div>'
    +'<div class="zoomctl"><button class="zbtn" onclick="zoomOut()">-</button><button class="zbtn" onclick="zoomIn()">+</button></div>'
    +built.svg
    +'</div>'
    +'<div class="legend">'
    +'<span><i class="hist"></i>Donnees relevees</span>'
    +'<span><i class="tgt"></i>Prix cible</span>'
    +'<span style="color:var(--dim)">molette = zoom</span>'
    +'</div>'
    +'<div class="grid4">'
    +'<div class="stat"><div class="l">Var. periode</div><div class="v num '+(changeAll>=0?'up':'down')+'">'+(changeAll>=0?'+':'')+changeAll.toFixed(1)+'%</div></div>'
    +'<div class="stat"><div class="l">Plus haut</div><div class="v num">'+(hist.length?fmt(Math.max.apply(null,hist)):'--')+'</div></div>'
    +'<div class="stat"><div class="l">Plus bas</div><div class="v num">'+(hist.length?fmt(Math.min.apply(null,hist)):'--')+'</div></div>'
    +'<div class="stat"><div class="l">Cible d\'achat</div><input type="number" value="'+Math.round(c.target)+'" onchange="updateTarget(this.value)"/></div>'
    +'</div>'
    +'<div class="sub" id="target-note" style="margin:-8px 0 8px"></div>'
    +'<div class="alertbox">'
    +(last!=null && last <= c.target
        ? ('Prix actuel sous ta cible ('+fmt(c.target)+') -- fenetre d\'achat favorable.')
        : (last!=null ? ('Il reste '+toTarget.toFixed(1)+'% de baisse avant la cible de '+fmt(c.target)+'.') : 'Pas encore de donnee de prix.'))
    +'</div>';
  attachCrosshair(built.meta);
}

function renderAlerts(){
  const hits = COMPONENTS.filter(function(c){
    const last = c.hist.length ? c.hist[c.hist.length-1] : null;
    return last!=null && last <= c.target * 1.03;
  });
  document.getElementById('alerts').innerHTML = hits.length
    ? hits.map(function(c){
        return '<div class="row" onclick="selectComp(\''+c.id+'\')" style="cursor:pointer">'
        +'<div><div class="name" style="font-size:11px">'+c.name+'</div><div class="sub">proche de la cible</div></div>'
        +'<div class="dot" style="background:var(--amber)"></div>'
        +'</div>';
      }).join('')
    : '<div class="row"><div class="sub">Aucune alerte active</div></div>';

  document.getElementById('sources').innerHTML = COMPONENTS.map(function(c){
    const supLines = (c.suppliers||[]).map(function(s){
      return '<div class="supline"><span>'+s.site+'</span><span class="p num">'
        +(s.url?('<a href="'+s.url+'" target="_blank">'+fmt(s.price)+' &#8599;</a>'):fmt(s.price))
        +'</span></div>';
    }).join('') || '<div class="sub">Pas encore de releve</div>';
    return '<div class="supblock"><div class="cname">'+c.name+'</div>'+supLines+'</div>';
  }).join('');
}

function selectComp(id){
  active = id;
  zoom = 1;
  renderAll();
}

function renderAll(){
  renderStatusBar();
  renderWatchlist();
  renderMain();
  renderAlerts();
}

loadData();
</script>
</body>
</html>
